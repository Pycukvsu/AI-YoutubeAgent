services:
  - type: web
    name: youtube-agent
    runtime: docker
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: youtube-agent-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: youtube-agent-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: youtube-agent-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: validate
      - key: SPRING_FLYWAY_ENABLED
        value: "true"

databases:
  - name: youtube-agent-db
    plan: free
    databaseName: youtube_agent
    ipAllowList: []
