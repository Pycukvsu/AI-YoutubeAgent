<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мини-сериалы — YouTube Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #e4e4e7; min-height: 100vh; }
        
        .header { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
            padding: 20px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .header h1 { 
            font-size: 22px; 
            font-weight: 700;
            background: linear-gradient(135deg, #9c27b0 0%, #e040fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header a { color: #71717a; text-decoration: none; font-size: 13px; font-weight: 500; transition: color 0.2s; }
        .header a:hover { color: #fff; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 30px; }
        
        .actions { display: flex; gap: 12px; margin-bottom: 28px; }
        .btn { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 600; 
            font-family: 'Inter', sans-serif;
            transition: all 0.2s; 
        }
        .btn-purple { background: linear-gradient(135deg, #9c27b0 0%, #7b1fa2 100%); color: #fff; box-shadow: 0 4px 15px rgba(156,39,176,0.3); }
        .btn-purple:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(156,39,176,0.4); }
        .btn-secondary { background: rgba(255,255,255,0.06); color: #e4e4e7; border: 1px solid rgba(255,255,255,0.1); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }
        .btn-success { background: linear-gradient(135deg, #00c853 0%, #00a844 100%); color: #fff; box-shadow: 0 4px 15px rgba(0,200,83,0.3); }
        .btn-success:hover { transform: translateY(-1px); }
        .btn-sm { padding: 8px 16px; font-size: 12px; border-radius: 8px; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
        
        .section { 
            background: linear-gradient(145deg, #18181b 0%, #1a1a2e 100%); 
            border-radius: 16px; 
            padding: 24px; 
            margin-bottom: 20px; 
            border: 1px solid rgba(255,255,255,0.06);
        }
        .section h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #fff; }
        .empty { text-align: center; padding: 60px 40px; color: #3f3f46; }
        
        .series-card { 
            background: linear-gradient(145deg, #1e1e30 0%, #252540 100%); 
            border-radius: 16px; 
            padding: 24px; 
            margin-bottom: 16px; 
            border: 1px solid rgba(156,39,176,0.15);
            transition: border-color 0.2s;
        }
        .series-card:hover { border-color: rgba(156,39,176,0.3); }
        .series-card h3 { 
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #9c27b0 0%, #e040fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .series-card .concept { color: #a1a1aa; font-size: 13px; line-height: 1.5; margin-bottom: 16px; }
        .series-card .meta { color: #52525b; font-size: 12px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
        
        .badge { 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: 600;
        }
        .badge.created { background: rgba(33,150,243,0.15); color: #2196f3; }
        .badge.generating { background: rgba(255,193,7,0.15); color: #ffc107; }
        .badge.completed { background: rgba(0,200,83,0.15); color: #00c853; }
        
        .episodes-list { margin-top: 16px; }
        .episode-item { 
            padding: 14px 18px; 
            background: rgba(255,255,255,0.02); 
            border-radius: 10px; 
            margin-bottom: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .episode-item:hover { background: rgba(255,255,255,0.04); }
        .episode-item .ep-left { display: flex; align-items: center; gap: 12px; }
        .episode-item .num { 
            background: linear-gradient(135deg, #9c27b0, #7b1fa2);
            color: #fff;
            width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700;
        }
        .episode-item .title { font-size: 14px; font-weight: 500; }
        .episode-item .hook { font-size: 12px; color: #71717a; margin-top: 2px; }
        .episode-item .status-icon { font-size: 18px; }
        
        .loading { text-align: center; padding: 60px 40px; color: #52525b; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Мини-сериалы</h1>
        <a href="/">← Dashboard</a>
    </div>
    <div class="container">
        <div class="actions">
            <button class="btn btn-purple" onclick="createSeries()">Создать сериал</button>
        </div>
        <div id="seriesList"><div class="loading">Загрузка...</div></div>
    </div>

    <script>
        const API = '';

        async function loadSeries() {
            try {
                const r = await fetch(API + '/api/series');
                const series = await r.json();
                if (series.length === 0) { document.getElementById('seriesList').innerHTML = '<div class="section"><div class="empty">Нет сериалов. Нажмите "Создать сериал" чтобы начать.</div></div>'; return; }

                const html = series.map(s => {
                    let episodesHtml = '';
                    try {
                        const data = JSON.parse(s.episodesJson);
                        const episodes = data.episodes || [];
                        episodesHtml = '<div class="episodes-list">' + episodes.map(ep => `
                            <div class="episode-item">
                                <div class="ep-left">
                                    <div class="num">${ep.episode_number}</div>
                                    <div>
                                        <div class="title">${ep.title}</div>
                                        <div class="hook">${ep.hook || ''}</div>
                                    </div>
                                </div>
                                <div class="status-icon">${ep.episode_number <= s.currentEpisode ? '✅' : '⏳'}</div>
                            </div>
                        `).join('') + '</div>';
                    } catch {}

                    return `
                    <div class="series-card">
                        <h3>${s.title}</h3>
                        <div class="concept">${s.concept || ''}</div>
                        <div class="meta">
                            <span class="badge ${s.status}">${s.status}</span>
                            <span>${s.currentEpisode}/${s.totalEpisodes} серий</span>
                        </div>
                        <button class="btn btn-success btn-sm" onclick="generateEpisode(${s.id})" ${s.currentEpisode >= s.totalEpisodes ? 'disabled' : ''}>
                            Сгенерировать следующую серию
                        </button>
                        ${episodesHtml}
                    </div>`;
                }).join('');

                document.getElementById('seriesList').innerHTML = html;
            } catch (e) {
                document.getElementById('seriesList').innerHTML = '<div class="section"><div class="empty">Ошибка загрузки</div></div>';
            }
        }

        async function createSeries() {
            const topic = prompt('Тема мини-сериала:');
            if (!topic) return;
            const episodes = prompt('Количество серий:', '5');
            if (!episodes) return;
            try {
                const r = await fetch(API + '/api/series', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({topic, episodes: parseInt(episodes)})
                });
                const series = await r.json();
                alert('Сериал создан: ' + series.title);
                loadSeries();
            } catch (e) { alert('Ошибка: ' + e.message); }
        }

        async function generateEpisode(seriesId) {
            try {
                const r = await fetch(API + '/api/series/' + seriesId + '/generate', { method: 'POST' });
                alert(await r.text());
                loadSeries();
            } catch (e) { alert('Ошибка: ' + e.message); }
        }

        loadSeries();
    </script>
</body>
</html>
