<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мини-сериалы — YouTube Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; }
        .header { background: #1a1a2e; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .header h1 { font-size: 24px; color: #9c27b0; }
        .header a { color: #888; text-decoration: none; font-size: 14px; }
        .header a:hover { color: #fff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px; }
        .section { background: #1a1a2e; border-radius: 12px; padding: 24px; margin-bottom: 20px; border: 1px solid #333; }
        .section h2 { font-size: 18px; margin-bottom: 16px; color: #fff; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
        .btn-primary { background: #9c27b0; color: #fff; }
        .btn-primary:hover { background: #7b1fa2; }
        .btn-secondary { background: #333; color: #fff; }
        .btn-secondary:hover { background: #444; }
        .btn-success { background: #00c853; color: #fff; }
        .btn-success:hover { background: #00a844; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .actions { display: flex; gap: 10px; margin-bottom: 20px; }
        .empty { text-align: center; padding: 40px; color: #666; }
        .loading { text-align: center; padding: 40px; color: #888; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #888; font-size: 12px; text-transform: uppercase; }
        td { font-size: 14px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge.created { background: #2196f320; color: #2196f3; }
        .badge.generating { background: #ffc10720; color: #ffc107; }
        .badge.completed { background: #00c85320; color: #00c853; }
        .series-card { background: #252540; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #444; }
        .series-card h3 { color: #9c27b0; margin-bottom: 8px; }
        .series-card .meta { color: #888; font-size: 13px; margin-bottom: 12px; }
        .series-card .actions { margin-bottom: 0; }
        .episodes-list { margin-top: 12px; }
        .episode-item { padding: 10px 16px; background: #1a1a2e; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .episode-item .title { font-size: 14px; }
        .episode-item .num { color: #9c27b0; font-weight: 600; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Мини-сериалы</h1>
        <a href="/">← Назад к Dashboard</a>
    </div>
    <div class="container">
        <div class="actions">
            <button class="btn btn-primary" onclick="createSeries()">Создать сериал</button>
        </div>

        <div class="section">
            <h2>Ваши сериалы</h2>
            <div id="seriesList"><div class="loading">Загрузка...</div></div>
        </div>
    </div>

    <script>
        const API = '';

        async function loadSeries() {
            try {
                const r = await fetch(API + '/api/series');
                const series = await r.json();

                if (series.length === 0) {
                    document.getElementById('seriesList').innerHTML = '<div class="empty">Нет сериалов. Нажмите "Создать сериал".</div>';
                    return;
                }

                const html = series.map(s => `
                    <div class="series-card">
                        <h3>${s.title}</h3>
                        <div class="meta">${s.concept || 'Без описания'}</div>
                        <div class="meta">Серий: ${s.currentEpisode}/${s.totalEpisodes} | <span class="badge ${s.status}">${s.status}</span></div>
                        <div class="actions">
                            <button class="btn btn-success btn-sm" onclick="generateEpisode(${s.id})" ${s.currentEpisode >= s.totalEpisodes ? 'disabled' : ''}>
                                Сгенерировать серию
                            </button>
                        </div>
                        <div class="episodes-list" id="episodes-${s.id}"></div>
                    </div>
                `).join('');

                document.getElementById('seriesList').innerHTML = html;

                for (const s of series) {
                    loadEpisodes(s.id);
                }
            } catch (e) {
                document.getElementById('seriesList').innerHTML = '<div class="empty">Ошибка загрузки</div>';
            }
        }

        async function loadEpisodes(seriesId) {
            try {
                const r = await fetch(API + '/api/series/' + seriesId);
                const series = await r.json();

                if (!series || !series.episodesJson) return;

                const data = JSON.parse(series.episodesJson);
                const episodes = data.episodes || [];
                const container = document.getElementById('episodes-' + seriesId);
                if (!container || episodes.length === 0) return;

                container.innerHTML = episodes.map(ep => `
                    <div class="episode-item">
                        <div>
                            <span class="num">E${ep.episode_number}</span>
                            <span class="title">${ep.title}</span>
                        </div>
                        <span style="color:#666;font-size:12px">${ep.episode_number <= series.currentEpisode ? '✅' : '⏳'}</span>
                    </div>
                `).join('');
            } catch (e) {}
        }

        async function createSeries() {
            const topic = prompt('Тема мини-сериала:');
            if (!topic) return;
            const episodes = prompt('Количество серий:', '5');
            if (!episodes) return;

            try {
                const r = await fetch(API + '/api/series', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({topic, episodes: parseInt(episodes)})
                });
                const series = await r.json();
                alert('Сериал создан: ' + series.title);
                loadSeries();
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        }

        async function generateEpisode(seriesId) {
            try {
                const r = await fetch(API + '/api/series/' + seriesId + '/generate', { method: 'POST' });
                const text = await r.text();
                alert(text);
                loadSeries();
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        }

        loadSeries();
    </script>
</body>
</html>
