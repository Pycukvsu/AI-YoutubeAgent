services:
  postgres:
    image: postgres:16-alpine
    container_name: youtube-agent-db
    environment:
      POSTGRES_DB: youtube_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: youtube-agent-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/youtube_agent
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PEXELS_API_KEY: ${PEXELS_API_KEY}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET}
      YOUTUBE_REFRESH_TOKEN: ${YOUTUBE_REFRESH_TOKEN}
      YOUTUBE_CHANNEL_ID: ${YOUTUBE_CHANNEL_ID}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src/main/resources/scripts:/app/scripts
      - ./src/main/resources/music:/app/music
      - youtube-temp:/tmp/youtube-agent

volumes:
  pgdata:
  youtube-temp:
